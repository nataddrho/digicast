# Interface to use for the AP (check with ifconfig or ip addr)
interface=wlan0

# Use the nl80211 driver which is standard for Raspberry Pi Zero 2 W
driver=nl80211

# SSID of your network
ssid=DigiCast

# Operating mode (g=2.4GHz)
hw_mode=g

# Channel number (choose a less congested channel like 1, 6, or 11)
channel=7

# Enable Wi-Fi Multimedia (WMM) - often required for 802.11n speeds
wmm_enabled=0

# Mac address authentication
macaddr_acl=0
auth_algs=1
ignore_broadcast_ssid=0

# WPA2 settings
wpa=2
wpa_passphrase=password
wpa_key_mgmt=WPA-PSK
wpa_pairwise=TKIP
rsn_pairwise=CCMP
